[theme]
primaryColor = "#1f77b4"
backgroundColor = "#ffffff"
secondaryBackgroundColor = "#f0f2f6"
textColor = "#262730"
font = "sans serif"

[server]
port = 8501
enableCORS = false
enableXsrfProtection = true
fileWatcherType = "none"

[browser]
gatherUsageStats = false

[logger]
level = "error"
messageFormat = "%(message)s"
